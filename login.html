<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso — PM Starter Kit PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#1c1917;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.box{background:#fafaf8;border-radius:16px;padding:48px;max-width:420px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,0.3)}
.logo{font-family:'Lora',serif;font-size:18px;font-weight:700;color:#1c1917;text-align:center;margin-bottom:32px}
.logo span{color:#c2410c}
.tabs{display:flex;gap:4px;background:#f5f0e8;border-radius:10px;padding:4px;margin-bottom:28px}
.tab{flex:1;padding:8px;border:none;background:transparent;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:#78716c;transition:all 0.15s}
.tab.active{background:#fff;color:#1c1917;box-shadow:0 1px 4px rgba(28,25,23,0.1)}
.label{font-size:12px;font-weight:600;color:#44403c;margin-bottom:6px;display:block}
.input{width:100%;padding:11px 14px;border:1.5px solid #e7e5e4;border-radius:10px;font-size:14px;font-family:inherit;color:#1c1917;background:#fff;outline:none;transition:border-color 0.15s;margin-bottom:14px}
.input:focus{border-color:#c2410c}
.btn{width:100%;padding:13px;background:#c2410c;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s;margin-top:4px}
.btn:hover{background:#a73509}
.btn:disabled{background:#e7e5e4;color:#a8a29e;cursor:not-allowed}
.msg{font-size:13px;text-align:center;margin-top:14px;padding:10px;border-radius:8px;display:none}
.msg.error{background:#fee2e2;color:#991b1b}
.msg.success{background:#f0fdf4;color:#166534}
.forgot{font-size:12px;color:#78716c;text-align:center;margin-top:12px;cursor:pointer;text-decoration:underline}
.forgot:hover{color:#c2410c}
.divider{text-align:center;font-size:12px;color:#a8a29e;margin:16px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:#e7e5e4}
.divider::before{left:0}.divider::after{right:0}
.back{text-align:center;margin-top:20px;font-size:13px;color:#78716c}
.back a{color:#c2410c;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="box">
  <div class="logo">PM<span>.</span>starterkit <span style="font-size:11px;background:#c2410c;color:#fff;padding:2px 8px;border-radius:20px;font-family:'DM Sans',sans-serif;font-weight:700;letter-spacing:0.06em;vertical-align:middle">PRO</span></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login', this)">Entrar</button>
    <button class="tab" onclick="switchTab('signup', this)">Criar conta</button>
  </div>

  <!-- LOGIN -->
  <div id="tab-login">
    <label class="label">Email</label>
    <input class="input" type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
    <label class="label">Senha</label>
    <input class="input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" id="btn-login" onclick="doLogin()">Entrar →</button>
    <div class="forgot" onclick="showReset()">Esqueci minha senha</div>
    <div class="msg" id="msg-login"></div>
  </div>

  <!-- SIGNUP -->
  <div id="tab-signup" style="display:none">
    <label class="label">Nome</label>
    <input class="input" type="text" id="signup-name" placeholder="Seu nome">
    <label class="label">Email</label>
    <input class="input" type="email" id="signup-email" placeholder="seu@email.com" autocomplete="email">
    <label class="label">Senha</label>
    <input class="input" type="password" id="signup-pass" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
    <label class="label">Confirmar senha</label>
    <input class="input" type="password" id="signup-pass2" placeholder="Repita a senha" onkeydown="if(event.key==='Enter')doSignup()">
    <button class="btn" id="btn-signup" onclick="doSignup()">Criar conta →</button>
    <div class="msg" id="msg-signup"></div>
    <p style="font-size:12px;color:#a8a29e;text-align:center;margin-top:12px">Ao criar conta você confirma que adquiriu o Kit PRO.</p>
  </div>

  <!-- RESET -->
  <div id="tab-reset" style="display:none">
    <p style="font-size:14px;color:#44403c;margin-bottom:16px;line-height:1.65">Digite seu email e enviaremos um link para redefinir sua senha.</p>
    <label class="label">Email</label>
    <input class="input" type="email" id="reset-email" placeholder="seu@email.com">
    <button class="btn" onclick="doReset()">Enviar link →</button>
    <div class="msg" id="msg-reset"></div>
    <div class="forgot" onclick="switchTab('login', document.querySelectorAll('.tab')[0])">← Voltar para login</div>
  </div>

  <div class="back"><a href="index.html">← Voltar ao site</a></div>
</div>

<script>
const _sb = supabase.createClient('https://uzocrlrvozpcbzkzbund.supabase.co', 'sb_publishable_qzHEgA53ylu6k0V_cvIaEQ_25SvQioC');

// Redirecionar se já estiver logado
_sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'kit-pro.html';
});

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.textContent = loading ? 'Aguarde...' : btn.dataset.label || btn.textContent;
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-login').style.display = name === 'login' ? '' : 'none';
  document.getElementById('tab-signup').style.display = name === 'signup' ? '' : 'none';
  document.getElementById('tab-reset').style.display = name === 'reset' ? '' : 'none';
}

function showReset() {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-login').style.display = 'none';
  document.getElementById('tab-signup').style.display = 'none';
  document.getElementById('tab-reset').style.display = '';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) return showMsg('msg-login', 'Preencha email e senha.', 'error');
  setLoading('btn-login', true);
  const { error } = await _sb.auth.signInWithPassword({ email, password: pass });
  setLoading('btn-login', false);
  if (error) return showMsg('msg-login', 'Email ou senha incorretos.', 'error');
  window.location.href = 'kit-pro.html';
}

async function doSignup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass = document.getElementById('signup-pass').value;
  const pass2 = document.getElementById('signup-pass2').value;
  if (!name || !email || !pass) return showMsg('msg-signup', 'Preencha todos os campos.', 'error');
  if (pass.length < 8) return showMsg('msg-signup', 'Senha deve ter pelo menos 8 caracteres.', 'error');
  if (pass !== pass2) return showMsg('msg-signup', 'As senhas não coincidem.', 'error');
  setLoading('btn-signup', true);
  const { error } = await _sb.auth.signUp({ email, password: pass, options: { data: { full_name: name } } });
  setLoading('btn-signup', false);
  if (error) return showMsg('msg-signup', 'Erro ao criar conta: ' + error.message, 'error');
  showMsg('msg-signup', 'Conta criada! Verifique seu email para confirmar o acesso.', 'success');
}

async function doReset() {
  const email = document.getElementById('reset-email').value.trim();
  if (!email) return showMsg('msg-reset', 'Digite seu email.', 'error');
  const { error } = await _sb.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://thaischehab-pm-starter-kit.vercel.app/login.html'
  });
  if (error) return showMsg('msg-reset', 'Erro: ' + error.message, 'error');
  showMsg('msg-reset', 'Link enviado! Verifique seu email.', 'success');
}
</script>
</body>
</html>
